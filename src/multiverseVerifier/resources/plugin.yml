name: LegacyMiningWorldMultiverseVerifier
version: ${version}
main: net.nobu0707.legacyminingworld.integration.MultiverseIntegrationVerifierPlugin
api-version: '26.1.2'
load: POSTWORLD
authors: [nobu0707]
description: Test-only Phase 4A and Phase 4B1 verifier; never ship this JAR as a release artifact
depend:
